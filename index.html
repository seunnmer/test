<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>v23 Supabase 테스트</title>
</head>
<body>

<h2>v23 Supabase 연결 테스트</h2>
<button onclick="endExperiment()">실험 종료 (테스트 저장)</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://aplbtqixpjwrbmlfbpvc.supabase.co";
const SUPABASE_KEY = "sb_publishable_VJr_wkau0Qb0zgu_mbDgyA_Y6wLBzSf";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function endExperiment() {
  console.log("버튼 클릭됨");

  const testData = {
    participant_id: "test_" + Date.now(),
    condition: "test_condition",
    started_at: new Date().toISOString(),
    completed_at: new Date().toISOString()
  };

  console.log("보낼 데이터:", testData);

  const { data, error } = await supabaseClient
    .from("participants")
    .insert([testData]);

  if (error) {
    console.error("❌ 저장 실패:", error);
  } else {
    console.log("✅ 저장 성공:", data);
    alert("저장 성공");
  }
}
</script>

</body>
</html>
